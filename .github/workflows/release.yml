name: Release IPK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
            goarm: ''
          - arch: aarch64
            goarch: arm64
            goarm: ''
          - arch: arm_cortex-a7
            goarch: arm
            goarm: '7'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 解析版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 编译二进制
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -ldflags="-s -w" -o scfddns .

      - name: 构建 IPK
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKG_NAME=cloudflare-ddns
          PKG_FILE="${PKG_NAME}_${VERSION}_${ARCH}.ipk"

          BUILD_DIR=$(mktemp -d)

          DATA_DIR="$BUILD_DIR/data"
          CTRL_DIR="$BUILD_DIR/control"
          mkdir -p "$DATA_DIR/usr/bin" "$DATA_DIR/usr/sbin" "$DATA_DIR/etc/init.d" "$DATA_DIR/etc/config"
          mkdir -p "$DATA_DIR/usr/lib/lua/luci/controller"
          mkdir -p "$DATA_DIR/usr/lib/lua/luci/model/cbi"
          mkdir -p "$DATA_DIR/usr/lib/lua/luci/view/cloudflare-ddns"
          mkdir -p "$CTRL_DIR"

          cp scfddns                                              "$DATA_DIR/usr/bin/scfddns"
          cp packaging/cloudflare-ddns-wrapper                   "$DATA_DIR/usr/sbin/cloudflare-ddns-wrapper"
          cp packaging/cloudflare-ddns-ctl                     "$DATA_DIR/usr/sbin/cloudflare-ddns-ctl"
          cp packaging/init.d/cloudflare-ddns                    "$DATA_DIR/etc/init.d/cloudflare-ddns"
          cp packaging/default-config                             "$DATA_DIR/etc/config/cloudflare-ddns"
          cp packaging/luci/controller/cloudflare-ddns.lua        "$DATA_DIR/usr/lib/lua/luci/controller/cloudflare-ddns.lua"
          cp packaging/luci/model/cbi/cloudflare-ddns.lua         "$DATA_DIR/usr/lib/lua/luci/model/cbi/cloudflare-ddns.lua"
          cp packaging/luci/view/cloudflare-ddns/log.htm          "$DATA_DIR/usr/lib/lua/luci/view/cloudflare-ddns/log.htm"
          chmod 755 "$DATA_DIR/usr/sbin/cloudflare-ddns-wrapper"
          chmod 755 "$DATA_DIR/usr/sbin/cloudflare-ddns-ctl"
          chmod 755 "$DATA_DIR/usr/bin/scfddns"
          chmod 755 "$DATA_DIR/etc/init.d/cloudflare-ddns"

          sed -e "s/PKGVERSION/$VERSION/g" \
              -e "s/PKGARCH/$ARCH/g" \
              packaging/control > "$CTRL_DIR/control"
          cp packaging/postinst  "$CTRL_DIR/postinst"
          cp packaging/prerm     "$CTRL_DIR/prerm"
          cp packaging/conffiles "$CTRL_DIR/conffiles"
          chmod 755 "$CTRL_DIR/postinst" "$CTRL_DIR/prerm"

          python3 packaging/make_ipk.py "$PKG_FILE" "$DATA_DIR" "$CTRL_DIR"

          echo "ipk_file=$PKG_FILE" >> "$GITHUB_ENV"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.arch }}
          path: cloudflare-ddns_*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          merge-multiple: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cloudflare-ddns_*.ipk
          generate_release_notes: true

  feed:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: artifacts

      - name: 安装 opkg-utils
        run: sudo apt-get install -y opkg-utils

      - name: 生成各架构 Packages 索引
        run: |
          mkdir -p feed
          for arch_dir in artifacts/ipk-*/; do
            arch=$(basename "$arch_dir" | sed 's/^ipk-//')
            mkdir -p "feed/$arch"
            cp "$arch_dir"*.ipk "feed/$arch/"
            (cd "feed/$arch" && opkg-make-index . > Packages && gzip -k Packages)
          done

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./feed
          keep_files: false

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 解析版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-cloudflare-ddns:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/simple-cloudflare-ddns:${{ steps.version.outputs.version }}

      - name: 更新 Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/simple-cloudflare-ddns
          readme-filepath: ./DOCKERHUB_README.md
