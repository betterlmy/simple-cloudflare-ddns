services:
  cloudflare-ddns:
    build: .
    container_name: simple-cloudflare-ddns
    restart: unless-stopped
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_RECORD_NAME=${CF_RECORD_NAME}
      - CF_RECORD_TYPE=${CF_RECORD_TYPE:-A}
      - CF_CHECK_INTERVAL=${CF_CHECK_INTERVAL:-300}
      # Optional:
      # - CF_TTL=1
      # - CF_PROXIED=false
      # - CF_IP_URLS=https://ipv4.icanhazip.com,https://api.ipify.org
      - TZ=Asia/Shanghai
    # 如果只想运行一次，可以覆盖启动命令：
    # command: ["./scfddns", "-once"]
